[profile.default]
failure-output = "immediate-final"
retries = { backoff = "fixed", count = 1, delay = "1s" }
slow-timeout = { period = "60s", terminate-after = 2, grace-period = "10s" }
fail-fast = true

[profile.ci]
inherits = "default"
flaky-result = "fail"
slow-timeout = { period = "90s", terminate-after = 2, grace-period = "10s" }
fail-fast = false

[profile.agent]
inherits = "ci"
status-level = "fail"
success-output = "never"
failure-output = "final"
slow-timeout = { period = "120s", terminate-after = 2, grace-period = "10s" }
fail-fast = false

[profile.fast]
inherits = "default"
retries = 0
slow-timeout = { period = "30s", terminate-after = 1, grace-period = "5s" }
fail-fast = true
status-level = "fail"
final-status-level = "fail"

[profile.snapshot]
inherits = "default"
retries = 0
fail-fast = false
