name: Performance

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "Justfile"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "tests/**"
      - "tools/**"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "Justfile"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "tests/**"
      - "tools/**"
  workflow_dispatch:

permissions: {}

jobs:
  codspeed:
    name: CodSpeed benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read # required for repository checkout
      id-token: write # required for OIDC authentication with CodSpeed
    concurrency:
      group: codspeed-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Verify Rust toolchain
        run: |
          set -euxo pipefail
          rustc --version
          cargo --version

      - name: Install cargo-codspeed
        uses: taiki-e/install-action@7627fb428e65e78e2ec9a24ae5c5bd5f8553f182 # v2.69.10
        with:
          tool: cargo-codspeed
          fallback: cargo-binstall

      - name: Build CodSpeed benchmarks
        run: cargo codspeed build -p strz-analysis -p strz-lsp

      - name: Run CodSpeed benchmarks
        uses: CodSpeedHQ/action@1c8ae4843586d3ba879736b7f6b7b0c990757fab # v4.12.1
        with:
          mode: simulation
          run: |
            cargo codspeed run -p strz-analysis
            cargo codspeed run -p strz-lsp

  black-box:
    if: github.event_name == 'workflow_dispatch'
    name: Black-box benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read # required for repository checkout
    concurrency:
      group: black-box-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Verify Rust toolchain
        run: |
          set -euxo pipefail
          rustc --version
          cargo --version

      - name: Install Hyperfine
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y hyperfine

      - name: Build release CLI
        run: cargo build -p strz --bin strz --release

      - name: Run black-box benchmarks
        run: tools/bench_black_box.sh --mode quick --output-dir tmp/benchmark-results/github-actions --binary target/release/strz

      - name: Upload benchmark results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: benchmark-results
          path: tmp/benchmark-results/github-actions
