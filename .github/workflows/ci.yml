name: CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "Justfile"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "tests/**"
      - "tools/**"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "Justfile"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "tests/**"
      - "tools/**"

permissions: {}

jobs:
  zizmor:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest
    permissions:
      contents: read # required for repository checkout
      actions: read # required for workflow analysis in private repositories
    concurrency:
      group: zizmor-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          advanced-security: false
          persona: pedantic
          min-severity: low

  test:
    name: Test grammar and bindings
    runs-on: ubuntu-latest
    env:
      TREE_SITTER_CLI_VERSION: v0.26.7
      TREE_SITTER_CLI_SHA256: aebda62865fccd009b605102d37896421c353816eede1d0662ccbf6538b323b5
    permissions:
      contents: read # required for repository checkout
    concurrency:
      group: test-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Verify Rust toolchain
        run: |
          set -euxo pipefail
          rustc --version
          cargo --version

      - name: Install just and cargo-nextest
        uses: taiki-e/install-action@0abfcd587b70a713fdaa7fb502c885e2112acb15 # v2.75.7
        with:
          # NOTE: tree-sitter-cli does not currently support binstall and isn't supported directly by `install-action`
          #       hopefully a future version will once relevant upstream cargo issue is resolved.
          tool: just@1.37.0,cargo-nextest@0.9.87
          fallback: none

      - name: Install Tree-sitter CLI
        run: |
          set -euxo pipefail
          archive="tree-sitter-cli-linux-x64.zip"
          url="https://github.com/tree-sitter/tree-sitter/releases/download/${TREE_SITTER_CLI_VERSION}/${archive}"
          temp_dir="$(mktemp -d)"
          install_dir="${HOME}/.local/bin"
          curl --fail --location --silent --show-error --output "${temp_dir}/${archive}" "${url}"
          echo "${TREE_SITTER_CLI_SHA256}  ${temp_dir}/${archive}" | sha256sum --check
          unzip -q "${temp_dir}/${archive}" -d "${temp_dir}/tree-sitter-cli"
          mkdir -p "${install_dir}"
          install "${temp_dir}/tree-sitter-cli/tree-sitter" "${install_dir}/tree-sitter"
          echo "${install_dir}" >> "${GITHUB_PATH}"

      - name: Regenerate parser artifacts
        run: just generate

      - name: Check generated files are in sync
        run: git diff --exit-code -- crates/strz-grammar/src/parser.c crates/strz-grammar/src/grammar.json crates/strz-grammar/src/node-types.json

      - name: Run grammar tests
        run: just test-grammar

      - name: Run Rust tests
        run: just test-rust-fast
