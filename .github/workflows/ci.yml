name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  zizmor:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest
    permissions:
      contents: read # required for repository checkout
      actions: read # required for workflow analysis in private repositories
    concurrency:
      group: zizmor-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
        with:
          advanced-security: false
          persona: pedantic

  test:
    name: Test grammar and bindings
    runs-on: ubuntu-latest
    permissions:
      contents: read # required for repository checkout
    concurrency:
      group: test-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Verify Rust toolchain
        run: |
          set -euxo pipefail
          rustc --version
          cargo --version

      - name: Install just, cargo-nextest and tree-sitter-cli
        uses: taiki-e/install-action@7627fb428e65e78e2ec9a24ae5c5bd5f8553f182 # v2.69.10
        with:
          # NOTE: tree-sitter-cli does not currently support binstall so this will do a full build
          #       hopefully a future version will once relevant upstream cargo issue is resolved.
          #       Retain this so if that day comes a version bump will get a faster build for free
          tool: just@1.37.0,cargo-nextest@0.9.87,tree-sitter-cli@0.26.7
          fallback: cargo-binstall

      - name: Regenerate parser artifacts
        run: just generate

      - name: Check generated files are in sync
        run: git diff --exit-code -- src/parser.c src/grammar.json src/node-types.json

      - name: Run grammar tests
        run: just test-grammar

      - name: Run Rust tests
        run: just test-rust-fast
